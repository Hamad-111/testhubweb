name: testhub2
description: "A new Flutter project which create and generate quiz with the help of AI."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_generative_ai: ^0.4.0
  path_provider: ^2.1.0
  pdf: ^3.10.0
  image: ^4.1.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  provider: ^6.1.1
  file_picker: ^8.1.2
  syncfusion_flutter_pdf: ^24.2.9
  firebase_vertexai: ^1.8.3
  firebase_ai: ^2.3.0
  http: ^1.2.0
  google_sign_in: ^6.2.1
  printing: ^5.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
